
[functions.ai_agent_webhook]
enabled = true
verify_jwt = true
import_map = "./functions/ai_agent_webhook/deno.json"
entrypoint = "./functions/ai_agent_webhook/index.ts"

[functions.ai_agent_webhook_v28]
enabled = true
verify_jwt = false
entrypoint = "./functions/ai_agent_webhook_v28/index.ts"

[functions.reminders_worker]
enabled = true
verify_jwt = true
import_map = "./functions/reminders_worker/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/reminders_worker/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/reminders_worker/*.html" ]
